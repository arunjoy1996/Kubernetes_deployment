# ./promtail/promtail-config.yaml
server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    batchwait: 1s
    batchsize: 1048576
    timeout: 10s

scrape_configs:
  # Scrape Docker container logs
  - job_name: docker_containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: name
            values:
              - ml-api
              - nginx
              - prometheus
              - grafana
              - cadvisor
    relabel_configs:
      # Use container name as log source identifier
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      # Add service label
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'service'
      # Keep only stdout and stderr
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: 'stream'
      # Use custom tag if available
      - source_labels: ['__meta_docker_container_label_logging_tag']
        target_label: 'tag'
        action: replace
      # Add hostname
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'compose_service'

  # Scrape host system logs (optional)
  - job_name: system_logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: varlogs
          __path__: /var/log/*log