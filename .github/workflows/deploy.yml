name: Build-Test-Deploy

on:
  workflow_dispatch:

  push:
    branches:
      - github-actions

jobs:

  build-test-deploy:

    runs-on: self-hosted

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Python
        run: |
          python --version

      - name: Install Dependencies
        run: |
          pip install -r ./requirements.txt

      - name: Run Tests
        run: |
          python -m pytest -v

      - name: Build API Image
        run: |
          docker build -t ml-api:latest .

      - name: Build Nginx Image
        run: |
          docker build `
            -t nginx-frontend:latest `
            -f nginx/Dockerfile .

      - name: Load Images Into Kind
        run: |
          kind load docker-image ml-api:latest `
            --name ml-app-cluster

          kind load docker-image nginx-frontend:latest `
            --name ml-app-cluster

      - name: Deploy To Kubernetes
        run: |
          kubectl apply -f kubernetes/ml-api.yaml
          kubectl apply -f kubernetes/nginx.yaml
          kubectl apply -f kubernetes/prometheus.yaml
          kubectl apply -f kubernetes/loki.yaml
          kubectl apply -f kubernetes/promtail.yaml
          kubectl apply -f kubernetes/grafana.yaml
          kubectl apply -f kubernetes/cadvisor.yaml

      - name: Wait For Rollout
        run: |
          kubectl rollout status deployment/ml-api
          kubectl rollout status deployment/nginx